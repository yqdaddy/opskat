name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop/*

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Create frontend dist placeholder
        run: mkdir -p frontend/dist && touch frontend/dist/.gitkeep
      - name: Create devserver static placeholder
        run: mkdir -p cmd/devserver/static/assets && echo "placeholder" > cmd/devserver/static/assets/placeholder.txt
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Create devserver static placeholder
        run: mkdir -p cmd/devserver/static/assets && echo "placeholder" > cmd/devserver/static/assets/placeholder.txt
      - run: go test ./internal/... ./cmd/opsctl/... ./pkg/... ./cmd/devserver/...

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile
      - name: Lint
        run: cd frontend && pnpm run lint
      - name: Test
        run: cd frontend && pnpm run test
      - name: Type check and build
        run: cd frontend && pnpm run build
