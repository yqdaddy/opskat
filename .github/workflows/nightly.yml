name: Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *" # UTC 18:00 = 北京时间凌晨 2:00
  push:
    branches:
      - nightly

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  sync:
    name: Sync from main
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: nightly
          fetch-depth: 0

      - name: Merge main into nightly
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge origin/main --no-edit
          git push

  prepare:
    name: Prepare version
    needs: [sync]
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      sha: ${{ steps.ver.outputs.sha }}
      skip: ${{ steps.ver.outputs.skip }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: nightly
          fetch-depth: 0

      - name: Compute version
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(git rev-parse HEAD)
          # 对比上一个 nightly release 的 commit，如果一致则跳过构建
          PREV_SHA=$(gh release view nightly --json targetCommitish --jq '.targetCommitish' 2>/dev/null || echo "")
          if [ -n "$PREV_SHA" ] && [ "$PREV_SHA" = "$SHA" ]; then
            echo "No new commits since last nightly ($PREV_SHA), skipping build."
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "sha=${SHA}" >> $GITHUB_OUTPUT
            echo "version=" >> $GITHUB_OUTPUT
            exit 0
          fi
          # 获取最新版本标签（包含预发布版本）
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          BASE_VERSION="${LATEST_TAG#v}"
          DATE=$(date -u +%Y%m%d)
          # 构建 nightly 版本号
          if [[ "$BASE_VERSION" == *-* ]]; then
            # 预发布版本: v1.0.0-beta.1 -> v1.0.0-beta.1.nightly.20260325
            VERSION="v${BASE_VERSION}.nightly.${DATE}"
          else
            # 稳定版本: v1.0.0 -> v1.0.0-nightly.20260325
            VERSION="v${BASE_VERSION}-nightly.${DATE}"
          fi
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

  build-desktop:
    name: Desktop (${{ matrix.platform }})
    needs: [prepare]
    if: ${{ always() && !failure() && !cancelled() && needs.prepare.outputs.skip != 'true' }}
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            platform: darwin-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            platform: darwin-amd64
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            platform: linux-amd64
            webkit_pkg: libwebkit2gtk-4.0-dev
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            platform: linux-arm64
            webkit_pkg: libwebkit2gtk-4.1-dev
            extra_tags: ",webkit2_41"
          - os: windows-latest
            goos: windows
            goarch: amd64
            platform: windows-amd64
          - os: windows-latest
            goos: windows
            goarch: arm64
            platform: windows-arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: nightly

      - name: Free disk space (macOS)
        if: matrix.goos == 'darwin'
        run: |
          rm -rf ~/Library/Android/sdk || true
          rm -rf ~/Library/Developer/CoreSimulator || true
          rm -rf ~/Library/Caches/Homebrew || true
          rm -rf /Users/runner/hostedtoolcache || true
          sudo rm -rf /usr/local/share/powershell || true
          sudo rm -rf /usr/local/lib/node_modules || true
          sudo rm -rf /usr/local/share/chromium || true

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev ${{ matrix.webkit_pkg || 'libwebkit2gtk-4.0-dev' }}

      - name: Install NSIS
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          choco install nsis -y
          echo "${env:ProgramFiles(x86)}\NSIS" >> $env:GITHUB_PATH

      - name: Build embedded opsctl
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w -X github.com/cago-frame/cago/configs.Version=${{ env.VERSION }} -X github.com/opskat/opskat/internal/buildinfo.CommitID=${{ needs.prepare.outputs.sha }}" -o ./internal/embedded/opsctl_bin ./cmd/opsctl/

      - name: Build desktop app
        if: matrix.goos != 'windows'
        run: wails build -platform ${{ matrix.goos }}/${{ matrix.goarch }} -ldflags="-s -w -X github.com/cago-frame/cago/configs.Version=${{ env.VERSION }} -X github.com/opskat/opskat/internal/buildinfo.CommitID=${{ needs.prepare.outputs.sha }}" -tags "embed_opsctl${{ matrix.extra_tags }}"

      - name: Build desktop app (Windows)
        if: matrix.goos == 'windows'
        run: wails build -nsis -platform ${{ matrix.goos }}/${{ matrix.goarch }} -ldflags="-s -w -X github.com/cago-frame/cago/configs.Version=${{ env.VERSION }} -X github.com/opskat/opskat/internal/buildinfo.CommitID=${{ needs.prepare.outputs.sha }}" -tags embed_opsctl

      - name: Import Apple certificate
        if: matrix.goos == 'darwin'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_P12" ]; then
            echo "No Apple certificate configured, skipping"
            exit 0
          fi
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV

      - name: Sign macOS app
        if: matrix.goos == 'darwin'
        run: |
          if [ -n "$SIGNING_IDENTITY" ]; then
            codesign --force --deep --sign "$SIGNING_IDENTITY" --options runtime --entitlements build/darwin/entitlements.plist build/bin/opskat.app
          else
            codesign --force --deep --sign - build/bin/opskat.app
          fi

      - name: Package (macOS dmg)
        if: matrix.goos == 'darwin'
        run: |
          DMG_SRC=$(mktemp -d)
          cp -R build/bin/opskat.app "$DMG_SRC/"
          ln -s /Applications "$DMG_SRC/Applications"
          hdiutil create -volname "Opskat" -srcfolder "$DMG_SRC" -ov -format UDZO opskat-${VERSION}-${{ matrix.platform }}.dmg
          rm -rf "$DMG_SRC"

      - name: Notarize macOS DMG
        if: matrix.goos == 'darwin'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "No signing identity, skipping notarization"
            exit 0
          fi
          xcrun notarytool submit opskat-${VERSION}-${{ matrix.platform }}.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple opskat-${VERSION}-${{ matrix.platform }}.dmg

      - name: Package (Linux deb)
        if: matrix.goos == 'linux'
        run: |
          PKG_ROOT=pkg-deb
          mkdir -p ${PKG_ROOT}/DEBIAN
          mkdir -p ${PKG_ROOT}/usr/bin
          mkdir -p ${PKG_ROOT}/usr/share/applications
          mkdir -p ${PKG_ROOT}/usr/share/icons/hicolor/256x256/apps
          cp build/bin/opskat ${PKG_ROOT}/usr/bin/opskat
          cp build/appicon.png ${PKG_ROOT}/usr/share/icons/hicolor/256x256/apps/opskat.png
          cat > ${PKG_ROOT}/DEBIAN/control << CTRL
          Package: opskat
          Version: $(echo "${VERSION#v}" | tr '-' '~')
          Section: utils
          Priority: optional
          Architecture: ${{ matrix.goarch }}
          Maintainer: opskat
          Description: Opskat desktop application
          CTRL
          sed -i 's/^          //' ${PKG_ROOT}/DEBIAN/control
          cat > ${PKG_ROOT}/usr/share/applications/opskat.desktop << DESK
          [Desktop Entry]
          Name=Opskat
          Exec=/usr/bin/opskat
          Icon=opskat
          Type=Application
          Categories=Utility;
          DESK
          sed -i 's/^          //' ${PKG_ROOT}/usr/share/applications/opskat.desktop
          dpkg-deb --build ${PKG_ROOT} opskat-${VERSION}-${{ matrix.platform }}.deb

      - name: Package (Windows installer)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: Move-Item "build\bin\opskat-${{ matrix.goarch }}-installer.exe" "opskat-$($env:VERSION)-${{ matrix.platform }}-installer.exe"

      - uses: actions/upload-artifact@v7
        with:
          name: nightly-opskat-${{ matrix.platform }}
          path: opskat-${{ env.VERSION }}-${{ matrix.platform }}*

  release:
    name: Update Nightly Release
    needs: [prepare, build-desktop]
    if: ${{ always() && !failure() && !cancelled() && needs.prepare.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: nightly-*
          merge-multiple: true

      - name: Generate checksums
        run: cd artifacts && sha256sum * > SHA256SUMS.txt

      - name: Update nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete nightly -y --cleanup-tag 2>/dev/null || true
          gh release create nightly --prerelease \
            --target ${{ needs.prepare.outputs.sha }} \
            --title "${{ needs.prepare.outputs.version }}" \
            --notes "Nightly build from \`nightly\` branch
          Commit: ${{ needs.prepare.outputs.sha }}
          Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            artifacts/*
